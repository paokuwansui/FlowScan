name: dnsx_brute_module
description: Dnsx 字典爆破 — 使用字典从根域名爆破子域名
check:
  command: $HOME/.local/bin/dnsx -version
  expect_keyword: Current Version
  exclude_keyword: not found
install:
  steps:
  - mkdir -p "$HOME/.local/bin" "$HOME/.cache/go-tmp"
  - GOBIN="$HOME/.local/bin" GOCACHE="$HOME/.cache/go-tmp" go install -v github.com/projectdiscovery/dnsx/cmd/dnsx@latest
  install_timeout_seconds: 1200
runtime:
  max_concurrency: 2
  exec_timeout_seconds: 600
allowed_output_events:
- SUBDOMAIN
- IP
io_contract:
  input_events:
  - DOMAIN
  input_transform_code: |
    import shlex
    domain = data["value"].strip().strip(".").lower()
    if not domain or "." not in domain:
        return []
    return [{"domain": domain, "domain_q": shlex.quote(domain)}]
execution:
  command: echo "mgdwd5Gh87b5y6aAEdpp.{{domain_q}}" | $HOME/.local/bin/dnsx -a -silent | grep -q . && exit 1 || $HOME/.local/bin/dnsx -d {{domain_q}} -w ./wordlists/subdomains.txt -silent -json -omit-raw -t 200 -timeout 3 -auto-wildcard 2>/dev/null
  output_parse_code: |
    import json
    results = []
    seen = set()
    for line in data["stdout"].splitlines():
        line = line.strip()
        if not line:
            continue
        host = ""
        try:
            item = json.loads(line)
            host = item.get("host") or item.get("input") or ""
            ip_list = item.get("a") or []
            if len(ip_list) > 1:
                ip_list = []
        except Exception:
            host = line
        host = host.strip().lower().strip(".")
        if host and "." in host and host not in seen:
            seen.add(host)
            results.append({"SUBDOMAIN": host})
        if len(ip_list) > 0:
            results.append({"IP": ip_list[0]})
    return results
