name: nmap_service_module
description: 基于 nmap -sV 的服务版本识别模块，将 PORT_OPEN(host:port) 转换为 SERVICE，并为 HTTP 类服务补充
  LIVE_URL
check:
  command: nmap --version && test -x "$HOME/.local/bin/nmap-service-flowscan"
  expect_keyword: Nmap
  exclude_keyword: not found
install:
  steps:
  - apt update
  - apt install nmap -y
  - install -m 0755 ./bin/nmap_service.py "$HOME/.local/bin/nmap-service-flowscan"
execute:
  inputs:
  - PORT_OPEN
  outputs:
  - SERVICE
  - LIVE_URL
  timeout: 300
  max_parallel_num: 5
  command: '"$HOME/.local/bin/nmap-service-flowscan" {{data}}'
parser:
  type: rules
  rules:
  - match:
      type: json_field
      field: state
      equals: open
    extract:
      HOST: '{{host}}'
      PORT: '{{port}}'
      PROTOCOL: '{{protocol}}'
      SERVICE_NAME: '{{service}}'
      PRODUCT: '{{product}}'
      VERSION: '{{version}}'
      SERVICE: '{{host}}:{{port}}/{{protocol}} open {{service}} {{product}} {{version}}'
      LIVE_URL: '{{service.replace(''ssl'',''https'').replace(''https-alt'',''https'').replace(''http-alt'',''http'')}}://{{host}}:{{port}}'
    events:
      SERVICE: '{{SERVICE}}'
      LIVE_URL: '{{LIVE_URL}}'
    filters:
      SERVICE:
        if_not_empty: true
      LIVE_URL:
        if_contains: http
event_extractors:
  SERVICE: ''
  LIVE_URL: (?P<value>https?://\S+)
