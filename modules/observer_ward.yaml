name: observer_ward_module
description: 跨平台社区化高精度Web指纹及服务识别组件
check:
  command: '"$HOME/.local/bin/observer_ward" --help'
  expect_keyword: observer_ward
  exclude_keyword: not found
install:
  steps:
  - mkdir -p "$HOME/.local/bin" && command -v observer_ward >/dev/null 2>&1 && ln
    -sf "$(command -v observer_ward)" "$HOME/.local/bin/observer_ward"
  - '"$HOME/.local/bin/observer_ward" -u || "$HOME/.local/bin/observer_ward" --update-plugin
    || true'
execute:
  inputs:
  - LIVE_URL
  outputs:
  - FINGERPRINT
  timeout: 900
  max_parallel_num: 10
  command: '"$HOME/.local/bin/observer_ward" -t {{data}} --format json --silent'
parser:
  type: rules
  rules:
  - match:
      type: json_field
      field: success
      equals: true
    extract:
      TARGET: '{{target}}'
      FINGERPRINT: $.matched[*].result.name[*]
    events:
      FINGERPRINT: '{{target}} | {{FINGERPRINT}}'
    filters:
      FINGERPRINT:
        if_not_empty: true
save:
  format: json
  output_path: ./outputs/fingerprints_{{DOMAIN}}_results.json
  mode: append
event_extractors:
  FINGERPRINT: ''
