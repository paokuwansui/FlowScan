name: subfinder_module
description: 基于标准Go协议栈的工业级被动子域名探测组件
check:
  command: 'subfinder -version'
  expect_keyword: Current Version
  exclude_keyword: not found
install:
  steps:
  - sudo apt update
  - sudo apt install subfinder -y
execute:
  inputs:
  - DOMAIN
  outputs:
  - SUBDOMAIN
  timeout: 900
  max_parallel_num: 5
  command: 'subfinder -d {{data}} -silent'
parser:
  type: rules
  rules:
  - match:
      type: regex
      pattern: ^(?P<SUBDOMAIN>[a-zA-Z0-9.-]+\.[a-zA-Z]{2,})$
    extract:
      SUBDOMAIN: '{{SUBDOMAIN}}'
event_extractors:
  SUBDOMAIN: (?P<value>(?:[A-Za-z0-9-]+\.)+[A-Za-z]{2,})
