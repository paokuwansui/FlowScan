name: naabu_module
description: ProjectDiscovery naabu 高速端口发现模块，产出 PORT_OPEN 事件
check:
  command: 'naabu -version'
  expect_keyword: Current Version
  exclude_keyword: not found
install:
  steps:
  - sudo apt update
  - sudo apt install naabu -y
execute:
  inputs:
  - IP
  - SUBDOMAIN
  outputs:
  - PORT_OPEN
  timeout: 1800
  max_parallel_num: 5
  command: 'naabu -host {{data}} -silent -p -'
parser:
  type: rules
  rules:
  - match:
      type: regex
      pattern: ^(?P<HOST>\[[0-9a-fA-F:]+\]|[^:\s]+):(?P<PORT>\d{1,5})$
    extract:
      HOST: '{{HOST}}'
      PORT: '{{PORT}}'
      PORT_OPEN: '{{HOST}}:{{PORT}}'
    events:
      PORT_OPEN: '{{HOST}}:{{PORT}}'
    filters:
      PORT_OPEN:
        if_not_empty: true
event_extractors:
  PORT_OPEN: (?P<value>[^\s:/]+:\d{1,5})
