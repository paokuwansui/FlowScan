name: naabu_module
description: ProjectDiscovery naabu 高速端口发现模块，产出 PORT_OPEN 事件
check:
  command: naabu -version
  expect_keyword: Current Version
  exclude_keyword: not found
install:
  steps:
  - go install github.com/projectdiscovery/naabu/v2/cmd/naabu@latest
  - install -m 0755 ~/go/bin/naabu /usr/local/bin/naabu
execute:
  inputs:
  - IP
  - SUBDOMAIN
  outputs:
  - PORT_OPEN
  timeout: 1800
  max_parallel_num: 5
  command: naabu -host {{data}} -top-ports 1000 -silent
parser:
  type: rules
  rules:
  - match:
      type: regex
      pattern: ^(?P<HOST>\[[0-9a-fA-F:]+\]|[^:\s]+):(?P<PORT>\d{1,5})$
    extract:
      HOST: '{{HOST}}'
      PORT: '{{PORT}}'
      PORT_OPEN: '{{HOST}}:{{PORT}}'
    events:
      PORT_OPEN: '{{HOST}}:{{PORT}}'
    filters:
      PORT_OPEN:
        if_not_empty: true
save:
  format: json
  output_path: ./outputs/naabu_{{DOMAIN}}_ports.json
  mode: append
