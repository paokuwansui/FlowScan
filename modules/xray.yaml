name: xray_passive_module
description: 长亭科技 Xray 被动漏洞代理监听组件
check:
  command: 'cd ./bin/xray && ./xray version'
  expect_keyword: 'Version: 1.9.11'
  exclude_keyword: ''
install:
  steps:
  - cd ./bin/xray && curl -fL https://github.com/chaitin/xray/releases/download/1.9.11/xray_linux_amd64.zip -o xray.zip && unzip -o xray.zip && mv xray_linux_amd64 xray && chmod +x xray && rm -f xray.zip
execute:
  inputs:
  - START
  outputs:
  - VULNERABILITY
  timeout: 99999999
  max_parallel_num: 1
  command: rm -f ./outputs/xray_out.json && cd ./bin/xray && ./xray webscan --listen 127.0.0.1:7777 --json-output ../../outputs/xray_out.json
parser:
  type: rules
  rules:
  - match:
      type: prefix
      value: '[VULN]'
    extract:
      VULNERABILITY: '{{rest}}'
event_extractors:
  VULNERABILITY: ''
