name: dirsearch_module
description: 基于 Python 开发的高并发 Web 敏感目录与隐藏文件爆破组件
check:
  command: 'dirsearch --version'
  expect_keyword: dirsearch
  exclude_keyword: not found
install:
  steps:
  - sudo apt update
  - sudo apt install dirsearch -y
execute:
  inputs:
  - LIVE_URL
  outputs:
  - URI
  timeout: 1800
  max_parallel_num: 2
  command: cd ./outputs && dirsearch -u {{data}} -e "*" --quiet --no-color
parser:
  type: rules
  rules:
  - match:
      type: regex
      pattern: ^\[[0-9:]+\]\s+(?P<STATUS_CODE>\d{3})\s+-\s+(?P<SIZE>[^-]+?)\s+-\s+(?P<URI>https?://\S+?)(?:\s+->\s+\S+)?$
    extract:
      URI: '{{URI}}'
      STATUS_CODE: '{{STATUS_CODE}}'
      SIZE: '{{SIZE.strip()}}'
    events:
      URI: '{{URI}}'
    filters:
      URI:
        if_not_empty: true
event_extractors:
  URI: (?P<value>https?://\S+)
