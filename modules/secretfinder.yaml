name: secretfinder_module
description: 前端 JS/页面敏感信息发现模块，轻量正则检测 token、AK/SK、JWT 等
check:
  command: '"$HOME/.local/bin/secretfinder-flowscan" || true'
  expect_keyword: 'usage: secretfinder.py'
  exclude_keyword: ''
install:
  steps:
  - mkdir -p "$HOME/.local/bin" && install -m 0755 ./bin/secretfinder.py "$HOME/.local/bin/secretfinder-flowscan"
execute:
  inputs:
  - URL
  - URI
  - LIVE_URL
  outputs:
  - SECRET
  - VULNERABILITY
  timeout: 120
  max_parallel_num: 5
  command: '"$HOME/.local/bin/secretfinder-flowscan" {{data}}'
parser:
  type: rules
  rules:
  - match:
      type: json_field
      field: type
      equals: FETCH_ERROR
    extract:
      VULNERABILITY: ''
  - match:
      type: json_field
      field: type
      equals: null
    extract:
      URL: '{{url}}'
      SECRET_TYPE: '{{type}}'
      SECRET_VALUE: '{{secret}}'
      CONTEXT: '{{context}}'
      SECRET: '{{type}} | {{url}} | {{secret}}'
      VULNERABILITY: '前端敏感信息泄露: {{type}} | {{url}}'
    events:
      SECRET: '{{SECRET}}'
      VULNERABILITY: '{{VULNERABILITY}}'
    filters:
      SECRET:
        if_not_empty: true
save:
  format: json
  output_path: ./outputs/secretfinder_{{DOMAIN}}_secrets.json
  mode: append
event_extractors:
  SECRET: ''
  VULNERABILITY: ''
