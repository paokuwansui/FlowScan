name: secretfinder_module
description: SecretFinder 敏感信息发现 — JS/URL 中查找密钥令牌，VULNERABILITY 透传 JSON
check:
  command: python3 ./bin/secretfinder.py -h
  expect_keyword: 'usage: secretfinder.py'
  exclude_keyword: ''
install:
  steps:
  - python3 -m pip install --user --break-system-packages requests_file requests jsbeautifier lxml
  install_timeout_seconds: 900
runtime:
  max_concurrency: 4
  exec_timeout_seconds: 120
allowed_output_events:
- VULNERABILITY
io_contract:
  input_events:
  - JS_URL
  - URL
  - LIVE_URL
  input_transform_code: |
    import shlex
    value = data["value"].strip()
    if not value.startswith(("http://", "https://", "file://")):
        return []
    return [{"target": value, "target_q": shlex.quote(value)}]
execution:
  command: python3 ./bin/secretfinder.py -i {{target_q}} -o cli 2>/dev/null
  output_parse_code: |
    import json
    results = []
    seen = set()

    for line in data["stdout"].splitlines():
        line = line.strip()
        if not line:
            continue
        # 尝试 JSON，失败则作为纯文本
        try:
            item = json.loads(line)
            value = json.dumps(item, ensure_ascii=False)
        except:
            value = line
        key = ("VULNERABILITY", value)
        if key not in seen:
            seen.add(key)
            results.append({"VULNERABILITY": value})

    return results
