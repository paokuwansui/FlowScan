name: nuclei_module
description: 基于模板的下一代快速漏洞扫描组件
check:
  command: '"$HOME/.local/bin/nuclei" -version'
  expect_keyword: nuclei
  exclude_keyword: not found
install:
  steps:
  - mkdir -p "$HOME/.local/bin" && GOBIN="$HOME/.local/bin" go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
  - '"$HOME/.local/bin/nuclei" -update-templates'
execute:
  inputs:
  - LIVE_URL
  outputs:
  - VULNERABILITY
  timeout: 1800
  max_parallel_num: 2
  command: '"$HOME/.local/bin/nuclei" -u {{data}} -severity high,critical -jsonl -silent'
parser:
  type: rules
  rules:
  - match:
      type: json_field
      field: template-id
      equals: null
    extract:
      TEMPLATE_ID: '{{template-id}}'
      SEVERITY: $.info.severity
      MATCHED_AT: '{{matched-at}}'
      VULNERABILITY: '[{{TEMPLATE_ID}}] [{{SEVERITY}}] {{MATCHED_AT}}'
    events:
      VULNERABILITY: '[{{TEMPLATE_ID}}] [{{SEVERITY}}] {{MATCHED_AT}}'
    filters:
      VULNERABILITY:
        if_not_empty: true
save:
  format: json
  output_path: ./outputs/nuclei_{{DOMAIN}}_vulns.json
  mode: append
event_extractors:
  VULNERABILITY: ''
