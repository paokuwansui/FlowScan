name: tlsx_module
description: TLS/证书信息采集模块，提取证书主体、颁发者、过期时间和 SAN 子域名
check:
  command: '"$HOME/.local/bin/tlsx" -version'
  expect_keyword: Current Version
  exclude_keyword: not found
install:
  steps:
  - GOBIN="$HOME/.local/bin" go install github.com/projectdiscovery/tlsx/cmd/tlsx@latest
execute:
  inputs:
  - LIVE_URL
  - SUBDOMAIN
  outputs:
  - CERT_INFO
  - SUBDOMAIN
  timeout: 300
  max_parallel_num: 10
  command: 'echo "{{data}}" | "$HOME/.local/bin/tlsx" -json -silent -san -cn -so'
parser:
  type: rules
  rules:
  - match:
      type: json_field
      field: host
      equals: null
    extract:
      HOST: '{{host}}'
      PORT: '{{port}}'
      SUBJECT_CN: '{{subject_cn}}'
      ISSUER_CN: '{{issuer_cn}}'
      NOT_AFTER: '{{not_after}}'
      SUBDOMAIN: $.subject_an[*]
      CERT_INFO: '{{host}}:{{port}} | CN={{subject_cn}} | Issuer={{issuer_cn}} | NotAfter={{not_after}}'
    events:
      CERT_INFO: '{{CERT_INFO}}'
      SUBDOMAIN: $.subject_an[*]
    filters:
      CERT_INFO:
        if_not_empty: true
      SUBDOMAIN:
        if_not_empty: true
event_extractors:
  CERT_INFO: ''
  SUBDOMAIN: (?P<value>(?:[A-Za-z0-9-]+\.)+[A-Za-z]{2,})
