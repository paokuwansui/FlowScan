name: fscan_module
description: 一款全方位一键内网/外网漏洞和弱口令综合扫描组件
check:
  command: '"$HOME/.local/bin/fscan"'
  expect_keyword: Fscan 2
  exclude_keyword: ''
install:
  steps:
  - 'python3 - <<''PY'' | xargs -I{} sh -c ''curl -fL
    "{}" -o "$HOME/.local/bin/fscan" && chmod 0755 "$HOME/.local/bin/fscan"''

    import json, urllib.request

    req=urllib.request.Request("https://api.github.com/repos/shadow1ng/fscan/releases/latest",
    headers={"User-Agent":"FlowScan-loader"})

    data=json.load(urllib.request.urlopen(req, timeout=30))

    assets=data.get("assets", [])

    matches=[a["browser_download_url"] for a in assets if a.get("name", "").startswith("fscan_")
    and "linux_x64" in a.get("name", "").lower()]

    print(matches[0] if matches else "")

    PY'
execute:
  inputs:
  - IP
  - SUBDOMAIN
  outputs:
  - LIVE_URL
  - PORT_OPEN
  - VULNERABILITY
  timeout: 1800
  max_parallel_num: 3
  command: '"$HOME/.local/bin/fscan" -h {{data}} -no -silent'
parser:
  type: rules
  rules:
  - match:
      type: prefix
      value: '[+]'
    extract:
      VULNERABILITY: '{{rest}}'
  - match:
      type: json_field
      field: type
      equals: PORT
    extract:
      PORT_OPEN: '{{host}}:{{port}}'
  - match:
      type: multi_match
      conditions:
      - type: json_field_equals
        field: type
        equals: SERVICE
      - type: json_field_in
        field: service
        values:
        - http
        - https
        - ssl
    extract:
      LIVE_URL: '{{service.replace(''ssl'',''https'')}}://{{host}}:{{port}}'
  - match:
      type: json_field
      field: service
      equals: dps-shell
    extract:
      VULNERABILITY: '异常Shell监听服务: {{target}} [ {{banner}} ]'
event_extractors:
  LIVE_URL: (?P<value>https?://\S+)
  PORT_OPEN: (?P<value>[^\s:/]+:\d{1,5})
  VULNERABILITY: ''
