name: katana_module
description: Katana 爬虫
check:
  command: katana -version
  expect_keyword: Current Version
  exclude_keyword: not found
install:
  steps:
  - mkdir -p "$HOME/.local/bin" "$HOME/.cache/go-tmp"
  - GOBIN="$HOME/.local/bin" GOCACHE="$HOME/.cache/go-tmp" go install -v github.com/projectdiscovery/katana/cmd/katana@latest
  - katana -u https://example.com -hl
  install_timeout_seconds: 1200
runtime:
  max_concurrency: 3
  exec_timeout_seconds: 1800
allowed_output_events:
  - URL
io_contract:
  input_events:
    - URL
  input_transform_code: |
    import shlex
    value = data["value"].strip()
    if not value.startswith(("http://", "https://")):
        value = "http://" + value
    return [{"target": value, "target_q": shlex.quote(value)}]
execution:
  command: katana -u {{target_q}} -proxy {{config.xray_remote_http_proxy}} -tlsi -hl -jc -xhr -fsu -c 5 -rl 20 -silent
  output_parse_code: |
      return []
