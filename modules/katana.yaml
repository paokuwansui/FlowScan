name: katana_module
description: ProjectDiscovery katana 现代 Web 爬虫模块，发现页面、接口和 JS 链接
check:
  command: '"$HOME/.local/bin/katana" -version'
  expect_keyword: Current Version
  exclude_keyword: not found
install:
  steps:
  - mkdir -p "$HOME/.local/bin" && GOBIN="$HOME/.local/bin" go install github.com/projectdiscovery/katana/cmd/katana@latest
execute:
  inputs:
  - LIVE_URL
  outputs:
  - URL
  timeout: 1800
  max_parallel_num: 3
  command: '"$HOME/.local/bin/katana" -u {{data}} -d 3 -jc -kf all -jsonl -silent'
parser:
  type: rules
  rules:
  - match:
      type: json_field
      field: request
      equals: null
    extract:
      METHOD: $.request.method
      URL: $.request.endpoint
      STATUS_CODE: $.response.status_code
    events:
      URL: '{{URL}}'
    filters:
      URL:
        if_not_empty: true
save:
  format: json
  output_path: ./outputs/katana_{{DOMAIN}}_urls.json
  mode: append
event_extractors:
  URL: (?P<value>https?://\S+)
