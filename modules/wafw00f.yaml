name: wafw00f_module
description: WAF/CDN 识别模块，识别目标前置防护产品
check:
  command: '"$HOME/.local/bin/wafw00f" --version'
  expect_keyword: WAFW00F
  exclude_keyword: not found
install:
  steps:
  - mkdir -p "$HOME/.local/bin" && (python3 -m pip install --user --break-system-packages
    wafw00f || python3 -m pip install --user wafw00f || true) && command -v wafw00f
    >/dev/null 2>&1 && ln -sf "$(command -v wafw00f)" "$HOME/.local/bin/wafw00f"
execute:
  inputs:
  - LIVE_URL
  outputs:
  - WAF
  - FINGERPRINT
  timeout: 300
  max_parallel_num: 5
  command: '"$HOME/.local/bin/wafw00f" {{data}} -f json -o - --no-colors'
parser:
  type: rules
  rules:
  - match:
      type: json_field
      field: detected
      equals: true
    extract:
      URL: '{{url}}'
      FIREWALL: '{{firewall}}'
      MANUFACTURER: '{{manufacturer}}'
      WAF: '{{url}} | {{firewall}} | {{manufacturer}}'
      FINGERPRINT: 'WAF: {{firewall}}'
    events:
      WAF: '{{WAF}}'
      FINGERPRINT: 'WAF: {{firewall}}'
    filters:
      WAF:
        if_not_empty: true
save:
  format: json
  output_path: ./outputs/wafw00f_{{DOMAIN}}_results.json
  mode: append
event_extractors:
  WAF: ''
  FINGERPRINT: ''
