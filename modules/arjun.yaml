name: arjun_module
description: Arjun HTTP 参数发现 — 对 Web 页面爆破隐藏 GET/POST/JSON 参数
check:
  command: arjun --help 2>&1 || true
  expect_keyword: usage
  exclude_keyword: not found
install:
  steps:
  - python3 -m pip install --user --break-system-packages arjun
  install_timeout_seconds: 300
runtime:
  max_concurrency: 2
  exec_timeout_seconds: 300
allowed_output_events:
- URL
- URL_INFO
io_contract:
  input_events:
  - LIVE_URL
  input_transform_code: |
    import shlex
    value = data["value"].strip()
    if not value.startswith(("http://", "https://")):
        value = "http://" + value
    return [{"target": value, "target_q": shlex.quote(value)}]
execution:
  command: arjun -u {{target_q}} -oJ --stable -t 10 -T 10 2>/dev/null
  output_parse_code: |
    import json, re
    from urllib.parse import urlencode

    results = []
    seen = set()
    seen_url_info = set()

    def add(k, v):
        v = str(v or "").strip()
        if not v:
            return
        key = (k, v)
        if key not in seen:
            seen.add(key)
            results.append({k: v})

    out = data["stdout"].strip()
    if not out:
        return results

    try:
        parsed = json.loads(out)
    except:
        return results

    items = []
    try:
        dict(parsed)
        items = [parsed]
    except:
        try:
            items = list(parsed)
        except:
            items = []

    for item in items:
        try:
            item = dict(item)
        except:
            continue
        url = item.get("url") or item.get("target") or ""
        params = item.get("params") or item.get("param") or []
        method = item.get("method") or "GET"
        status = item.get("status") or ""
        error = item.get("error") or ""

        if error or status not in ("ok", "done", ""):
            continue

        if not url:
            continue

        # 参数列表
        param_list = []
        try:
            param_list = list(params)
        except:
            param_list = [str(params)] if params else []

        if not param_list:
            continue

        # 生成带参数的 URL
        param_str = "&".join("%s=%s" % (p, "test") for p in param_list)
        if "?" in url:
            full_url = "%s&%s" % (url, param_str)
        else:
            full_url = "%s?%s" % (url, param_str)
        add("URL", full_url)

        # URL_INFO 汇总
        if url not in seen_url_info:
            seen_url_info.add(url)
            parts = [url]
            parts.append("method=%s" % method)
            parts.append("params=%s" % ",".join(param_list))
            add("URL_INFO", " | ".join(parts))

    return results
