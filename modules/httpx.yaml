name: httpx_module
description: 基于多用途的高速 HTTP 存活探测与基础指纹识别组件
check:
  command: python3 ./bin/httpx_wrapper.py --help
  expect_keyword: normalize
  exclude_keyword: not found
install:
  steps:
  - GOBIN="$HOME/.local/bin" go install github.com/projectdiscovery/httpx/cmd/httpx@latest
  - python3 -m pip install --user --break-system-packages tldextract
execute:
  inputs:
  - URL
  - PORT_OPEN
  outputs:
  - LIVE_URL
  - DOMAIN
  - SUBDOMAIN
  - IP
  - ICON_PATH
  - ICON_HASH
  - CERT_ORG
  - CERT_FINGERPRINT
  timeout: 900
  max_parallel_num: 10
  command: echo '{{data}}' | python3 ./bin/httpx_wrapper.py --httpx-bin "$HOME/.local/bin/httpx"
parser:
  type: rules
  rules:
  - match:
      type: json_field
      field: LIVE_URL
      equals: null
    extract:
      LIVE_URL: '{{LIVE_URL}}'
      DOMAIN: $.DOMAIN[*]
      SUBDOMAIN: $.SUBDOMAIN[*]
      IP: $.IP[*]
      ICON_PATH: '{{ICON_PATH}}'
      ICON_HASH: '{{ICON_HASH}}'
      CERT_ORG: $.CERT_ORG[*]
      CERT_FINGERPRINT: '{{CERT_FINGERPRINT}}'
    events:
      LIVE_URL: '{{LIVE_URL}}'
      DOMAIN: $.DOMAIN[*]
      SUBDOMAIN: $.SUBDOMAIN[*]
      IP: $.IP[*]
      ICON_PATH: '{{ICON_PATH}}'
      ICON_HASH: '{{ICON_HASH}}'
      CERT_ORG: $.CERT_ORG[*]
      CERT_FINGERPRINT: '{{CERT_FINGERPRINT}}'
    filters:
      LIVE_URL:
        if_not_empty: true
event_extractors:
  LIVE_URL: (?P<value>https?://\S+)
  DOMAIN: ''
  SUBDOMAIN: '(?P<value>(?!\*)[A-Za-z0-9_-]+(?:\.[A-Za-z0-9_-]+)*\.[A-Za-z]{2,})'
  IP: (?P<value>(?:\d{1,3}\.){3}\d{1,3})
  ICON_PATH: ''
  ICON_HASH: ''
  CERT_ORG: ''
  CERT_FINGERPRINT: (?P<value>[A-Fa-f0-9]{64})
