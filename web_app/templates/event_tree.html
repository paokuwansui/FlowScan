{% extends "base.html" %}
{% block title %}事件图谱{% endblock %}
{% block content %}
<div class="eq-layout-tree">
    <div class="eq-sidebar graph-left-panel">
        <h3>搜索</h3>
        <div style="margin-bottom:12px;">
            <input type="text" id="graph-search-input" placeholder="输入事件值模糊搜索…"
                   style="width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:0.85rem;">
        </div>
        <button class="btn btn-sm btn-primary" onclick="searchGraph()" style="width:100%;">搜索链路</button>
        <button class="btn btn-sm btn-danger" onclick="deleteSelectedRenderedSubtree()" style="width:100%;margin-top:8px;">删除选中渲染</button>
        <button class="btn btn-sm btn-secondary" onclick="resetGraph()" style="width:100%;margin-top:8px;">清空图谱</button>
        <div id="search-results" style="margin-top:10px;"></div>
        <hr style="border-color:var(--border);margin:12px 0;">
        <div style="font-size:0.78rem;color:var(--text-muted);line-height:1.6;">
            <p><strong>操作说明</strong></p>
            <p>• 默认右侧显示所有根事件</p>
            <p>• 点击右侧事件：渲染到图谱并展开其直接子事件</p>
            <p>• 点击图中事件：右侧同步显示直接子事件</p>
            <p>• 删除按钮只删除图中渲染，不删除 Redis 数据</p>
            <p>• 搜索结果点击后渲染根事件到目标事件的完整链路</p>
        </div>
    </div>

    <div class="eq-main">
        <div id="graph-container" style="width:100%;height:calc(100vh - 120px);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);"></div>
    </div>

    <div class="eq-detail" id="detail-panel">
        <div id="detail-content">
            <div class="eq-detail-header">
                <div class="eq-detail-type" id="detail-type">根事件</div>
                <div class="eq-detail-value" id="detail-value">点击任一根事件开始展开图谱</div>
            </div>
            <div id="detail-children"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='vis-network.min.js') }}"></script>
<style>
#graph-container canvas { display: block; }
.vis-network:focus { outline: none; }
.graph-result-item,
.graph-list-item {
    padding: 7px 8px;
    margin-bottom: 5px;
    background: var(--bg);
    border: 1px solid transparent;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.78rem;
}
.graph-result-item:hover,
.graph-list-item:hover { border-color: rgba(88,166,255,0.35); background: rgba(88,166,255,0.06); }
.graph-list-item.selected { border-color: var(--primary); background: rgba(88,166,255,0.12); }
.graph-item-value { display:block; font-family:monospace; word-break:break-all; white-space:normal; color:var(--text); }
.graph-item-meta { display:block; margin-top:3px; color:var(--text-muted); font-size:0.68rem; }
</style>
<script>
var nodes = new vis.DataSet([]);
var edges = new vis.DataSet([]);
var eventCache = {};
var nodeFpMap = {};
var fpNodeMap = {};
var renderedChildren = {};
var renderedEdgeKeys = {};
var selectedFp = null;
var nextId = 1;
var roots = {{ roots | tojson | safe }};

roots.forEach(function(root) { cacheEvent(normalizeEvent(root)); });

var container = document.getElementById('graph-container');
var options = {
    nodes: {
        shape: 'box',
        color: { background: '#161b22', border: '#30363d', highlight: { background: '#1c2333', border: '#58a6ff' } },
        font: { color: '#e6edf3', size: 13, face: 'monospace' },
        borderWidth: 1.5,
        borderWidthSelected: 2.5,
        margin: { top: 7, bottom: 7, left: 10, right: 10 },
    },
    edges: {
        color: { color: '#30363d', highlight: '#58a6ff', hover: '#58a6ff' },
        font: { color: '#8b949e', size: 11, face: 'sans-serif', align: 'middle', strokeWidth: 0 },
        width: 1.5,
        arrows: { to: { enabled: true, scaleFactor: 0.65 } },
        smooth: { type: 'cubicBezier', forceDirection: 'horizontal', roundness: 0.3 },
    },
    physics: {
        solver: 'forceAtlas2Based',
        forceAtlas2Based: { gravitationalConstant: -45, centralGravity: 0.01, springLength: 190, springConstant: 0.025 },
        stabilization: { iterations: 180 },
    },
    interaction: { hover: true, tooltipDelay: 200, zoomView: true, dragView: true, multiselect: false },
    layout: { improvedLayout: true },
};
var network = new vis.Network(container, { nodes: nodes, edges: edges }, options);

// 初始布局完成后关闭物理引擎，避免节点聚拢
network.once('stabilizationIterationsDone', function() {
    network.setOptions({ physics: false });
});
// 兜底：1.5 秒后强制关闭
setTimeout(function() {
    network.setOptions({ physics: false });
}, 1500);

// 拖拽结束后固定节点位置，防止被物理引擎拉回
network.on('dragEnd', function(params) {
    if (!params.nodes || params.nodes.length === 0) return;
    var positions = network.getPositions(params.nodes);
    params.nodes.forEach(function(nodeId) {
        if (!positions[nodeId]) return;
        nodes.update({ id: nodeId, x: positions[nodeId].x, y: positions[nodeId].y, fixed: { x: true, y: true } });
    });
});

renderRootList();

network.on('click', function(params) {
    if (!params.nodes.length) return;
    var fp = nodeFpMap[params.nodes[0]];
    if (fp) selectEvent(fp, { render: false, expand: false, focus: false });
});

function normalizeEvent(evt) {
    return {
        fingerprint: evt.fingerprint || evt.fp || '',
        fp: evt.fingerprint || evt.fp || '',
        event_type: evt.event_type || evt.type || '',
        value: evt.value || '',
        source_tool: evt.source_tool || evt.tool || evt.source || evt.tool_name || '',
        parent_fp: evt.parent_fp || '',
        root_fp: evt.root_fp || '',
        created_at: evt.created_at || evt.timestamp || ''
    };
}

function cacheEvent(evt) {
    evt = normalizeEvent(evt);
    if (evt.fingerprint) eventCache[evt.fingerprint] = evt;
    return evt;
}

function eventLabel(evt) {
    var value = evt.value || '';
    var label = '[' + (evt.event_type || '?') + '] ' + value;
    if (label.length > 80) label = label.slice(0, 77) + '...';
    return label;
}

function eventTitle(evt) {
    return '<b>' + escapeHtml(evt.event_type || '?') + '</b><br>' +
        escapeHtml(evt.value || '') + '<br><small>source: ' + escapeHtml(evt.source_tool || '?') +
        '<br>fp: ' + escapeHtml((evt.fingerprint || '').slice(0, 16)) + '...</small>';
}

function renderEventNode(evt) {
    evt = cacheEvent(evt);
    var fp = evt.fingerprint;
    if (!fp) return null;
    if (fpNodeMap[fp]) return fpNodeMap[fp];
    var id = nextId++;
    var isRoot = !evt.parent_fp || evt.root_fp === fp;
    nodes.add({
        id: id,
        label: eventLabel(evt),
        title: eventTitle(evt),
        color: { background: isRoot ? '#16212e' : '#1a2332', border: '#30363d' },
        shape: 'box'
    });
    fpNodeMap[fp] = id;
    nodeFpMap[id] = fp;
    return id;
}

function renderEdge(parentFp, childEvt) {
    var parentId = fpNodeMap[parentFp];
    var childId = fpNodeMap[childEvt.fingerprint];
    if (!parentId || !childId) return;
    var key = parentFp + '->' + childEvt.fingerprint;
    if (renderedEdgeKeys[key]) return;
    var label = (childEvt.source_tool || '?') + ' → ' + (childEvt.event_type || '?');
    edges.add({ id: key, from: parentId, to: childId, label: label, title: label });
    renderedEdgeKeys[key] = true;
}

function renderRootList() {
    selectedFp = null;
    document.getElementById('detail-type').textContent = '根事件 (' + roots.length + ')';
    document.getElementById('detail-value').textContent = '点击根事件后，该事件会渲染到图谱，右侧继续显示它的直接子事件';
    var html = '';
    roots.forEach(function(root) {
        root = cacheEvent(root);
        html += eventListHtml(root, '', true);
    });
    document.getElementById('detail-children').innerHTML = html || '<div class="eq-detail-empty">暂无根事件</div>';
}

function eventListHtml(evt, parentFp, isRoot) {
    var fp = evt.fingerprint || evt.fp || '';
    var val = escapeHtml(evt.value || '');
    var type = escapeHtml(evt.event_type || '?');
    var source = escapeHtml(evt.source_tool || evt.tool || evt.source || '?');
    var click = isRoot ? "selectEvent('" + jsEscape(fp) + "', {render:true, expand:false, focus:true})" : "selectEvent('" + jsEscape(fp) + "', {render:true, parentFp:'" + jsEscape(parentFp) + "', expand:false, focus:true})";
    return '<div class="graph-list-item" data-fp="' + escapeHtml(fp) + '" onclick="' + click + '">' +
        '<span class="badge badge-event" style="font-size:0.65rem;">' + type + '</span>' +
        '<span class="graph-item-value">' + val + '</span>' +
        '<span class="graph-item-meta">' + (isRoot ? 'root' : ('by ' + source)) + ' · fp ' + escapeHtml(fp.slice(0, 12)) + '</span>' +
        '</div>';
}

function selectEvent(fp, opts) {
    opts = opts || {};
    selectedFp = fp;
    document.querySelectorAll('.graph-list-item').forEach(function(el) { el.classList.toggle('selected', el.getAttribute('data-fp') === fp); });
    var evt = eventCache[fp];
    if (opts.render) {
        if (!evt && opts.event) evt = cacheEvent(opts.event);
        if (evt) renderEventNode(evt);
        if (opts.parentFp && evt) renderEdge(opts.parentFp, evt);
    }
    if (fpNodeMap[fp]) {
        network.selectNodes([fpNodeMap[fp]]);
        if (opts.focus !== false) network.focus(fpNodeMap[fp], { scale: 1.15, animation: true });
    }
    loadChildrenPanel(fp, true);
}

function loadChildrenPanel(fp, autoRenderKnown) {
    var evt = eventCache[fp] || { fingerprint: fp, event_type: '事件', value: 'fp: ' + fp.slice(0, 16) + '...' };
    document.getElementById('detail-type').textContent = (evt.event_type || '事件') + ' 的直接子事件';
    document.getElementById('detail-value').textContent = evt.value || fp;
    var childBox = document.getElementById('detail-children');
    childBox.innerHTML = '<div class="loading">加载子事件...</div>';
    fetch('/api/event-tree/children/' + encodeURIComponent(fp))
        .then(function(resp) { return resp.json(); })
        .then(function(groups) {
            renderedChildren[fp] = groups || [];
            renderChildrenList(fp, groups || []);
        })
        .catch(function() { childBox.innerHTML = '<div class="empty-state">加载失败</div>'; });
}

function renderChildrenList(parentFp, groups) {
    var html = '';
    if (!groups.length) {
        document.getElementById('detail-children').innerHTML = '<div class="eq-detail-empty" style="font-size:0.78rem;padding:20px 0;">无直接子事件</div>';
        return;
    }
    groups.forEach(function(group) {
        html += '<div class="eq-detail-group">';
        html += '<div class="eq-detail-group-title">' + escapeHtml(group.event_type || '?') + ' (' + group.count + ')</div>';
        (group.events || []).forEach(function(raw) {
            var evt = cacheEvent(normalizeEvent({
                fingerprint: raw.fp,
                event_type: group.event_type,
                value: raw.value,
                source_tool: raw.tool || raw.source,
                parent_fp: parentFp
            }));
            html += eventListHtml(evt, parentFp, false);
        });
        html += '</div>';
    });
    document.getElementById('detail-children').innerHTML = html;
}

function renderImmediateChildren(parentFp, done) {
    var parentId = fpNodeMap[parentFp];
    if (!parentId) { if (done) done(); return; }
    fetch('/api/event-tree/children/' + encodeURIComponent(parentFp))
        .then(function(resp) { return resp.json(); })
        .then(function(groups) {
            renderedChildren[parentFp] = groups || [];
            (groups || []).forEach(function(group) {
                (group.events || []).forEach(function(raw) {
                    var evt = cacheEvent(normalizeEvent({
                        fingerprint: raw.fp,
                        event_type: group.event_type,
                        value: raw.value,
                        source_tool: raw.tool || raw.source,
                        parent_fp: parentFp
                    }));
                    renderEventNode(evt);
                    renderEdge(parentFp, evt);
                });
            });
            // 为新加入的节点做一次局部布局后关闭物理引擎
            network.setOptions({ physics: true });
            network.stabilize(120);
            setTimeout(function() {
                network.setOptions({ physics: false });
                network.fit({ animation: true });
            }, 400);
            if (done) done();
        })
        .catch(function() { if (done) done(); });
}

function deleteSelectedRenderedSubtree() {
    if (!selectedFp || !fpNodeMap[selectedFp]) return;
    var removeFps = collectRenderedDescendants(selectedFp);
    removeFps.push(selectedFp);
    var removeNodeIds = [];
    removeFps.forEach(function(fp) {
        if (fpNodeMap[fp]) removeNodeIds.push(fpNodeMap[fp]);
    });
    var removeEdges = [];
    edges.forEach(function(edge) {
        if (removeNodeIds.indexOf(edge.from) !== -1 || removeNodeIds.indexOf(edge.to) !== -1) removeEdges.push(edge.id);
    });
    if (removeEdges.length) edges.remove(removeEdges);
    if (removeNodeIds.length) nodes.remove(removeNodeIds);
    removeFps.forEach(function(fp) {
        var id = fpNodeMap[fp];
        if (id) delete nodeFpMap[id];
        delete fpNodeMap[fp];
        delete renderedChildren[fp];
    });
    renderedEdgeKeys = {};
    edges.forEach(function(edge) {
        var fromFp = nodeFpMap[edge.from];
        var toFp = nodeFpMap[edge.to];
        if (fromFp && toFp) renderedEdgeKeys[fromFp + '->' + toFp] = true;
    });
    selectedFp = null;
    renderRootList();
}

function collectRenderedDescendants(fp) {
    var out = [];
    var parentId = fpNodeMap[fp];
    if (!parentId) return out;
    edges.forEach(function(edge) {
        if (edge.from === parentId) {
            var childFp = nodeFpMap[edge.to];
            if (childFp) {
                out.push(childFp);
                out = out.concat(collectRenderedDescendants(childFp));
            }
        }
    });
    return Array.from(new Set(out));
}

function resetGraph() {
    nodes.clear();
    edges.clear();
    nodeFpMap = {};
    fpNodeMap = {};
    renderedEdgeKeys = {};
    renderedChildren = {};
    selectedFp = null;
    nextId = 1;
    renderRootList();
}

function searchGraph() {
    var q = document.getElementById('graph-search-input').value.trim();
    if (!q) return;
    var box = document.getElementById('search-results');
    box.innerHTML = '<div class="loading">搜索中...</div>';
    fetch('/api/event-tree/search?value=' + encodeURIComponent(q))
        .then(function(resp) { return resp.json(); })
        .then(function(items) {
            if (!items || !items.length) {
                box.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;">未找到</div>';
                return;
            }
            var html = '<div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:6px;">' + items.length + ' 个结果</div>';
            items.forEach(function(item) {
                cacheEvent(normalizeEvent(item));
                html += '<div class="graph-result-item" onclick="renderPath(\'' + jsEscape(item.fp) + '\')">' +
                    '<span class="badge badge-event" style="font-size:0.65rem;">' + escapeHtml(item.event_type || '?') + '</span>' +
                    '<span class="graph-item-value">' + escapeHtml(item.value || '') + '</span>' +
                    '<span class="graph-item-meta">by ' + escapeHtml(item.source_tool || item.tool_name || '?') + ' · fp ' + escapeHtml((item.fp || '').slice(0, 12)) + '</span>' +
                    '</div>';
            });
            box.innerHTML = html;
        })
        .catch(function() { box.innerHTML = '<div style="color:var(--danger);font-size:0.8rem;">搜索失败</div>'; });
}

function renderPath(fp) {
    fetch('/api/path/' + encodeURIComponent(fp))
        .then(function(resp) { return resp.json(); })
        .then(function(path) {
            if (!path || !path.length) return;
            var prevFp = '';
            path.forEach(function(raw, idx) {
                var evt = cacheEvent(normalizeEvent(raw));
                renderEventNode(evt);
                if (idx > 0) renderEdge(prevFp, evt);
                prevFp = evt.fingerprint;
            });
            var targetFp = path[path.length - 1].fingerprint;
            selectEvent(targetFp, { render: false, focus: true });
            // 为新加入的节点做一次局部布局后关闭物理引擎
            network.setOptions({ physics: true });
            network.stabilize(120);
            setTimeout(function() {
                network.setOptions({ physics: false });
                network.fit({ animation: true });
            }, 400);
        });
}

function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(String(str || '')));
    return div.innerHTML;
}
function jsEscape(str) { return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

document.getElementById('graph-search-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') searchGraph();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') network.unselectAll();
});
</script>
{% endblock %}
