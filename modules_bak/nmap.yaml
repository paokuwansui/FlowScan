name: nmap_service_module
description: Nmap 全量探测 — 对开放端口进行服务版本/OS/证书/标题/主机名识别
check:
  command: nmap --version
  expect_keyword: Nmap
  exclude_keyword: not found
install:
  steps:
  - sudo apt update
  - sudo apt install nmap -y
  install_timeout_seconds: 900
runtime:
  max_concurrency: 4
  exec_timeout_seconds: 300
allowed_output_events:
- FINGERPRINT
- LIVE_URL
- DOMAIN
- SUBDOMAIN
- URL_INFO
- VULNERABILITY
io_contract:
  input_events:
  - PORT_OPEN
  input_transform_code: |
    import re, shlex

    value = data["value"].strip()
    if not value:
        return []

    # 格式: "127.0.0.1:[22,6379,8080,443]"
    m = re.match(r"(\d+\.\d+\.\d+\.\d+):\[([0-9,\s]+)\]", value)
    if m:
        host = m.group(1)
        ports = [p.strip() for p in m.group(2).split(",") if p.strip()]
        ports_str = ",".join(ports)
        return [{"host": host, "ports": ports_str, "host_q": shlex.quote(host), "ports_q": shlex.quote(ports_str)}]

    return []
execution:
  command: nmap -A -T5 -Pn --open --script vuln -p {{ports_q}} --min-rate 10000 --max-retries 2 --host-timeout 3m -oX - {{host_q}}
  output_parse_code: |
    import re, json
    import xml.etree.ElementTree as ET
    import tldextract
    from urllib.parse import urlparse

    results = []
    seen = set()
    url_info_map = {}  # url -> {url, title, tech[], service, port, host}

    def add(k, v):
        v = str(v or "").strip()
        if not v:
            return
        key = (k, v)
        if key not in seen:
            seen.add(key)
            results.append({k: v})

    def _acc_url_info(port_str, addr, port, svc_name, svc_detail, tech_val, tech_ver, title_val):
        """累积 URL_INFO，以 port_str 为 key。"""
        if not port_str:
            return
        if port_str not in url_info_map:
            url_info_map[port_str] = {"host": addr, "port": port, "service": "", "detail": "", "tech": [], "title": ""}
        info = url_info_map[port_str]
        if svc_name and not info["service"]:
            info["service"] = svc_name
        if svc_detail and not info["detail"]:
            info["detail"] = svc_detail
        if tech_val:
            t = ("%s %s" % (tech_val, tech_ver)).strip() if tech_ver else tech_val
            if t not in info["tech"]:
                info["tech"].append(t)
        if title_val and not info["title"]:
            info["title"] = title_val

    try:
        text = data["stdout"]
        start = text.find("<nmaprun")
        if start > 0:
            text = text[start:]
        root = ET.fromstring(text)
    except:
        return []

    for host_node in root.findall("host"):
        # ── 地址 ──
        addr = ""
        for an in host_node.findall("address"):
            if an.get("addrtype") == "ipv4":
                addr = an.get("addr", "")
                break
        if not addr:
            addr_node = host_node.find("address")
            if addr_node is not None:
                addr = addr_node.get("addr", "")
        if not addr:
            continue

        # ── 主机名 (PTR rDNS) → 拆分为 DOMAIN/SUBDOMAIN ──
        hostname_node = host_node.find("hostnames/hostname") or host_node.find(".//hostname")
        if hostname_node is not None:
            hname = (hostname_node.get("name") or "").strip().lower().rstrip(".")
            if hname and "." in hname:
                ext = tldextract.extract(hname)
                domain = ext.registered_domain
                if domain:
                    add("DOMAIN", domain)
                if ext.subdomain:
                    add("SUBDOMAIN", hname)

        # ── OS 探测 → FINGERPRINT ──
        os_node = host_node.find("os")
        if os_node is not None:
            for osmatch in os_node.findall("osmatch"):
                name = osmatch.get("name", "")
                acc = osmatch.get("accuracy", "")
                if name:
                    add("FINGERPRINT", "OS: %s (accuracy=%s%%) @ %s" % (name, acc, addr) if acc else "OS: %s @ %s" % (name, addr))

        # ── 端口 ──
        for port_node in host_node.findall(".//port"):
            state = port_node.find("state")
            if state is None or state.get("state") != "open":
                continue
            port = port_node.get("portid", "")
            proto = port_node.get("protocol", "tcp")
            port_str = "%s:%s" % (addr, port)

            # ── 服务信息 ──
            svc = port_node.find("service")
            if svc is not None:
                name = svc.get("name", "")
                product = svc.get("product", "")
                version = svc.get("version", "")
                extra = svc.get("extrainfo", "")
                detail = " ".join([x for x in [name, product, version, extra] if x])
                if detail:
                    add("FINGERPRINT", "%s/%s => %s" % (proto, port_str, detail))

                # 技术栈
                if product:
                    _acc_url_info(port_str, addr, port, name, detail, product, version, "")
                if extra:
                    _acc_url_info(port_str, addr, port, name, detail, extra, "", "")

                # Web URL
                web_url = ""
                if name in ("http", "http-alt", "http-proxy"):
                    web_url = "http://%s:%s" % (addr, port)
                    add("LIVE_URL", web_url)
                elif name in ("https", "ssl/http", "ssl", "https-alt"):
                    web_url = "https://%s:%s" % (addr, port)
                    add("LIVE_URL", web_url)

                # 非 Web 服务也记录 URL_INFO（用 port_str 做 key）
                if not web_url:
                    _acc_url_info(port_str, addr, port, name, detail, "", "", "")

            # ── NSE 脚本 ──
            for script_node in port_node.findall("script"):
                sid = script_node.get("id", "")
                output = script_node.get("output", "")

                # 服务 banner（http-server-header 等）
                if sid == "http-server-header" and output:
                    banner = output.split("\n")[0].strip()
                    if banner:
                        _acc_url_info(port_str, addr, port, "", "", banner, "", "")

                # 页面标题
                if sid == "http-title" and output:
                    title = output.strip().split("\n")[0].strip()
                    if title:
                        _acc_url_info(port_str, addr, port, "", "", "", "", title)

                # 证书信息（ssl-cert / ssl-heartbleed / 任意 SSL 脚本）
                if any(kw in sid for kw in ("ssl-cert", "ssl-", "tls-")) or "ssl-cert" in sid:
                    cn = re.search(r"CN\s*=\s*([^\s,\n,/\\;]+)", output)
                    if not cn:
                        cn = re.search(r"commonName\s*=\s*([^\s,\n,]+)", output)
                    if cn:
                        add("FINGERPRINT", "cert_cn=%s @ %s" % (cn.group(1).rstrip(","), port_str))
                    san_list = re.findall(r"DNS:([^\s,\n,]+)", output)
                    for san in san_list[:5]:
                        san = san.strip().rstrip(",")
                        if san and san != "*":
                            add("SUBDOMAIN", san)
                    org = re.search(r"(?:Issuer|organizationName)\s*[:=]\s*.+?O\s*=\s*([^\s,\n]+)", output)
                    if org:
                        add("FINGERPRINT", "cert_issuer=%s @ %s" % (org.group(1), port_str))
                    fp256 = re.search(r"(?:SHA-256|sha256)\s*[:=]\s*(\S+)", output, re.I)
                    if fp256:
                        add("FINGERPRINT", "cert_sha256=%s @ %s" % (fp256.group(1), port_str))

                # 漏洞脚本输出（--script vuln）
                if "vuln" in sid or sid.startswith("http-") or sid.startswith("ssl-"):
                    # vulners CVE 列表: <table><table><elem key="id">CVE-xxx</elem><elem key="cvss">9.8</elem>...
                    if sid == "vulners":
                        for table_node in script_node.iter("table"):
                            cells = table_node.findall("elem")
                            cve_id = cvss = ""
                            for cell in cells:
                                k = (cell.get("key") or "").strip().lower()
                                v = (cell.text or "").strip()
                                if k == "id" and v.startswith("CVE"):
                                    cve_id = v
                                if k == "cvss":
                                    cvss = v
                            if cve_id:
                                add("VULNERABILITY", "[vulners] %s (CVSS:%s) @ %s" % (cve_id, cvss or "?", port_str))
                    else:
                        # 其他漏洞脚本: state=VULNERABLE / LIKELY VULNERABLE
                        vuln_found = False
                        # 结构化 table 输出: <table><table><elem key="state">VULNERABLE</elem>...
                        for table_node in script_node.iter("table"):
                            cells = table_node.findall("elem")
                            for cell in cells:
                                k = (cell.get("key") or "").strip().lower()
                                if k == "state" and "VULNERABLE" in (cell.text or "").strip().upper():
                                    vuln_found = True
                                    break
                            if vuln_found:
                                break
                        if not vuln_found:
                            # 纯文本输出中搜索
                            vuln_found = "VULNERABLE" in output.upper() or "vulnerable" in output.lower()
                        if vuln_found:
                            summary = output.strip().split("\n")[0][:120] if output.strip() else sid
                            add("VULNERABILITY", "[nmap/%s] %s @ %s" % (sid, summary, port_str))

    # ── 输出 URL_INFO（每个端口一条） ──
    for port_str, info in url_info_map.items():
        parts = ["%s:%s" % (info["host"], info["port"])]
        if info["service"]:
            parts.append("service=%s" % info["service"])
        if info["detail"]:
            parts.append("detail=%s" % info["detail"])
        if info["title"]:
            parts.append("title=%s" % info["title"])
        if info["tech"]:
            parts.append("tech=%s" % ",".join(info["tech"]))
        results.append({"URL_INFO": " | ".join(parts)})

    return results
