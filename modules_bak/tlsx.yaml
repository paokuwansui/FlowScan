name: tlsx_module
description: Tlsx TLS 证书扫描 — 对子域名/URL 独立提取 TLS 证书 SAN/CN/指纹/颁发者
check:
  command: $HOME/.local/bin/tlsx -version
  expect_keyword: Current Version
  exclude_keyword: not found
install:
  steps:
  - mkdir -p "$HOME/.local/bin" "$HOME/.cache/go-tmp"
  - GOBIN="$HOME/.local/bin" GOCACHE="$HOME/.cache/go-tmp" go install -v github.com/projectdiscovery/tlsx/cmd/tlsx@latest
  install_timeout_seconds: 1200
runtime:
  max_concurrency: 6
  exec_timeout_seconds: 120
allowed_output_events:
- SUBDOMAIN
- CERT_INFO
- FINGERPRINT
- URL_INFO
io_contract:
  input_events:
  - SUBDOMAIN
  - LIVE_URL
  input_transform_code: |
    import shlex
    from urllib.parse import urlparse

    value = data["value"].strip()
    if not value:
        return []

    # 提取主机名（处理 URL 和裸域名）
    if "://" in value:
        p = urlparse(value)
        host = p.hostname or ""
        port = str(p.port or 443)
    else:
        host = value.split("/")[0].split(":")[0]
        port = "443"

    if not host:
        return []
    return [{"host": host, "port": port, "host_q": shlex.quote(host), "port_q": shlex.quote(port)}]
execution:
  command: $HOME/.local/bin/tlsx -u {{host_q}} -p {{port_q}} -json -silent -san -cn -cert -tls-version -cipher -timeout 8 -retries 1 -c 20 2>/dev/null
  output_parse_code: |
    import json
    results = []
    seen = set()
    seen_url_info = set()

    def add(k, v):
        v = str(v or "").strip().strip(".")
        if not v or v == "*":
            return
        key = (k, v)
        if key not in seen:
            seen.add(key)
            results.append({k: v})

    def add_list(k, items):
        if items is None:
            return
        try:
            for x in items:
                add(k, x)
        except:
            pass

    for line in data["stdout"].splitlines():
        try:
            item = json.loads(line.strip())
        except:
            continue

        host = item.get("host") or item.get("input") or ""
        port = item.get("port") or "443"
        target_str = "%s:%s" % (host, port) if host else ""

        # SAN → SUBDOMAIN
        san_list = item.get("subject_an") or item.get("san") or item.get("dns_names")
        try:
            san_list = list(san_list) if san_list else []
        except:
            san_list = []
        add_list("SUBDOMAIN", san_list)

        # CN → SUBDOMAIN
        cn = item.get("subject_cn") or item.get("cn") or ""
        if cn and cn != "*":
            add("SUBDOMAIN", cn)

        # 证书/密码信息
        for key in ("issuer_cn", "issuer_org", "subject_org", "tls_version", "cipher"):
            val = item.get(key)
            if val:
                add("CERT_INFO", "%s=%s @ %s" % (key, val, target_str))

        # 证书指纹
        fp = item.get("fingerprint_hash")
        try:
            fp = dict(fp) if fp else {}
        except:
            fp = {}
        sha256 = fp.get("sha256") or ""
        if sha256:
            add("FINGERPRINT", "cert_sha256=%s @ %s" % (sha256, target_str))

        # URL_INFO
        if target_str and target_str not in seen_url_info:
            seen_url_info.add(target_str)
            parts = [target_str]
            if cn and cn != "*":
                parts.append("cert_cn=%s" % cn)
            if san_list:
                parts.append("san=%s" % ",".join(str(s) for s in san_list[:5]))
            issuer = item.get("issuer_org") or item.get("issuer_cn") or ""
            if issuer:
                parts.append("issuer=%s" % issuer)
            tls_ver = item.get("tls_version") or ""
            if tls_ver:
                parts.append("tls=%s" % tls_ver)
            if sha256:
                parts.append("cert_sha256=%s" % sha256[:16])
            add("URL_INFO", " | ".join(parts))

    return results
