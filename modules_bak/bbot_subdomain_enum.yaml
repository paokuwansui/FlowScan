name: bbot_subdomain_module
description: BBOT 综合扫描 — 联动多源被动收集与字典爆破，自适应多级泛解析过滤
check:
  command: bbot --version
  expect_keyword: BIGHUGE BLS OSINT TOOL
  exclude_keyword: not found
install:
  steps:
    - apt update
    - apt install pipx -y
    - pipx ensurepath
    - pipx install bbot --pip-args="--upgrade --force-reinstall" --python python3.13
    - bbot --install-all
  install_timeout_seconds: 3600
runtime:
  max_concurrency: 4
  exec_timeout_seconds: 3600
allowed_output_events:
  - SUBDOMAIN
  - IP
  - URL
  - PORT_OPEN


io_contract:
  input_events:
    - DOMAIN
    - SUBDOMAIN
    - IP
    - FINGERPRINT
  input_transform_code: |
    import shlex
    # 数据清洗：去空格、去末尾点、统一小写
    domain = data["value"].strip().strip(".").lower()
    # 基础合法性拦截
    if not domain or "." not in domain:
        return []
    # 返回清洗后并经过 shell 安全转义的变量
    return [{"domain": domain, "domain_q": shlex.quote(domain)}]

execution:
  # 可以通过-c modules.massdns.wordlist=./wordlists/subdomains.txt 设置大字典
  command: bbot -t {{domain_q}} -p subdomain-enum --json --brief -y
  output_parse_code: |
    import json

    def parse_bbot_output(data):
        results = []
        # 用于最终结果整体去重的集合
        seen_results = set()
        # 临时存储端口数据，结构为：{ ip: set(ports) }
        port_aggregator = {}
        
        root_domain = data.get("domain", "").strip().lower().strip(".")

        for line in data["stdout"].splitlines():
            line = line.strip()
            if not line or not line.startswith('{'):
                continue
            try:
                event = json.loads(line)
                event_type = event.get("type", "")
                event_data = event.get("data", "")

                if not event_data or event_type == "SCAN":
                    continue
                
                parsed_item = None

                # 1. 解析子域名事件
                if event_type == "DNS_NAME":
                    host = event_data.strip().lower().strip(".")
                    if host and "." in host and host != root_domain:
                        parsed_item = {"SUBDOMAIN": host}
                
                # 2. 解析 IP 事件
                elif event_type in ["IP_ADDRESS", "IPV6_ADDRESS"]:
                    ip = event_data.strip()
                    if ip:
                        parsed_item = {"IP": ip}
                
                # 4. 收集 TCP 端口事件（先按主机归总，后续统一格式化）
                elif event_type == "OPEN_TCP_PORT":
                    host = event.get("host", "").strip()
                    # 转换端口为整型以便后续排序，若非数字则保留字符串
                    port = int(event_data) if str(event_data).isdigit() else str(event_data).strip()
                    if host and port:
                        if host not in port_aggregator:
                            port_aggregator[host] = set()
                        port_aggregator[host].add(port)
                
                else:
                    
                    fingerprint_str = f"{bbot_subdomain_module} -> {data["value"]} -> {json.dumps(event, ensure_ascii=False)}"
                    parsed_item = {event_type: fingerprint_str}

                # 基础事件的整体去重
                if parsed_item:
                    item_tuple = tuple(parsed_item.items())
                    if item_tuple not in seen_results:
                        seen_results.add(item_tuple)
                        results.append(parsed_item)

            except Exception as e:
                continue

        # 5. 格式化 TCP 端口事件为指定格式：{"PORT_OPEN": "127.0.0.1 -> [80,81,82]"}
        for host, ports in port_aggregator.items():
            # 端口数字升序排序
            sorted_ports = sorted(list(ports))
            # 组合成 [80,81,82] 格式的字符串（逗号后无空格）
            ports_str = f"[{','.join(map(str, sorted_ports))}]"
            
            # 拼接为 "127.0.0.1 ->"
            port_open_value = f"{host} -> {ports_str}"
            
            parsed_port_item = {"PORT_OPEN": port_open_value}
            item_tuple = tuple(parsed_port_item.items())
            
            # 端口最终结果整体去重
            if item_tuple not in seen_results:
                seen_results.add(item_tuple)
                results.append(parsed_port_item)

        return results
      parse_bbot_output(data["stdout"])
