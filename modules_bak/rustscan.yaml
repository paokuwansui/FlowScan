name: rustscan_module
description: RustScan 全端口扫描 — 对 IP 执行极速 SYN 扫描（默认 1-65535，无 ping，纯 SYN 无需特权）
check:
  command: rustscan --version 2>&1 || true
  expect_keyword: rustscan
  exclude_keyword: not found
install:
  steps:
  - sudo apt update 
  - sudo apt install rustscan -y 2>/dev/null
  install_timeout_seconds: 1800
runtime:
  max_concurrency: 4
  exec_timeout_seconds: 300
allowed_output_events:
- PORT_OPEN
io_contract:
  input_events:
  - IP
  input_transform_code: |
    import shlex
    value = data["value"].strip()
    if not value:
        return []
    return [{"target": value, "target_q": shlex.quote(value)}]
execution:
  command: rustscan -a {{target_q}} -r 1-65535 --scripts none -b 4500 -t 1500 -u 15000 -g 2>/dev/null
  output_parse_code: |
    results = []
    seen = set()
    for line in data["stdout"].splitlines():
        line = line.strip()
        if not line or " -> " not in line:
            continue
        try:
            ip_part, ports_part = line.split(" -> ", 1)
            ports = []
            for port in ports_part.strip().strip("[]").split(","):
                port = port.strip()
                if port:
                    ports.append(int(port))
        except:
            continue
        if not ip_part or not ports:
            continue
        # 防止误把全端口/泛响应结果推入后续扫描链路
        if len(ports) >= 65535:
            continue
        value = "%s:[%s]" % (ip_part.strip(), ",".join(str(p) for p in sorted(set(ports))))
        if value not in seen:
            seen.add(value)
            results.append({"PORT_OPEN": value})
    return results
