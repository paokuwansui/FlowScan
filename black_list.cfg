# ===== FlowScan3 统一黑名单（文件默认规则，只读） =====
# 格式: 事件类型:匹配模式:匹配值
# 事件类型用 * 表示匹配所有事件类型
# 匹配模式: contains (正则) | suffix | prefix | ip_range
# 匹配忽略大小写
